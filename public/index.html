<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Profile Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>Upload Profile</h2>
    <form action="/upload" method="POST" enctype="multipart/form-data">
        <input type="text" name="name" placeholder="Full Name" required>
        <input type="file" name="profile_pic" accept="image/*" required>
        <button type="submit">Upload User</button>
    </form>

    <h2>View User</h2>
    <select id="userDropdown" onchange="updateImage()">
        <option value="">-- Select a User --</option>
    </select>

    <div class="viewer">
        <strong id="userName">Selection placeholder</strong>
        <img id="userImage" src="" style="display:none;" alt="Profile">
    </div>
</div>

<script>
    // Fetch users from API and populate dropdown
    async function loadUsers() {
        const response = await fetch('/users');
        const users = await response.json();
        const dropdown = document.getElementById('userDropdown');
        
        users.forEach(user => {
            const opt = document.createElement('option');
            opt.value = user.id;
            opt.textContent = `${user.name} (ID: ${user.id})`;
            dropdown.appendChild(opt);
        });
    }

    function updateImage() {
        const dropdown = document.getElementById('userDropdown');
        const img = document.getElementById('userImage');
        const nameTxt = document.getElementById('userName');
        
        if (dropdown.value) {
            img.src = '/image/' + dropdown.value;
            img.style.display = 'block';
            nameTxt.innerText = "Viewing: " + dropdown.options[dropdown.selectedIndex].text;
        } else {
            img.style.display = 'none';
            nameTxt.innerText = "No user selected";
        }
    }

    // Initialize on load
    loadUsers();
</script>

</body>
</html>
